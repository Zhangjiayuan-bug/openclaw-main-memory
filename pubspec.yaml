name: workflow_app
description: "OpenClaw Workflow Manager - 科技风开发流程管理App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # WebSocket (OpenClaw连接)
  web_socket_channel: ^3.0.1

  # HTTP & API
  http: ^1.2.2

  # Local Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # JSON
  json_annotation: ^4.9.0

  # Date/Time
  intl: ^0.19.0

  # Utils
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
